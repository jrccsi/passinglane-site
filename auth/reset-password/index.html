<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Opening Passing Lane...</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #1a4a3a;
        color: #f0f4f2;
        text-align: center;
        padding: 24px;
      }
      img { width: 72px; height: 72px; border-radius: 16px; margin-bottom: 24px; }
      h1  { font-size: 22px; font-weight: 700; margin: 0 0 8px; }
      p   { font-size: 15px; color: #8ab09a; margin: 0 0 32px; }
      a   {
        display: inline-block;
        background: #3ecf6e;
        color: #0d2d1e;
        font-size: 16px;
        font-weight: 700;
        text-decoration: none;
        padding: 14px 32px;
        border-radius: 12px;
      }
    </style>
  </head>
  <body>
    <img src="https://passinglane.app/icon.png" alt="Passing Lane" />
    <h1>Opening password reset...</h1>
    <p>You will be redirected to the Passing Lane app automatically.</p>
    <a id="openBtn" href="#">Open Passing Lane</a>

    <script>
      (function () {
        var search = window.location.search || "";
        var hash = window.location.hash || "";
        var outputParams = new URLSearchParams(search);

        if (hash.length > 1) {
          var hashParams = new URLSearchParams(hash.slice(1));
          hashParams.forEach(function (value, key) {
            outputParams.set(key, value);
          });
        }

        if (outputParams.get("token_hash") && !outputParams.get("type")) {
          outputParams.set("type", "recovery");
        }

        if (Array.from(outputParams.keys()).length === 0) {
          document.querySelector("h1").textContent = "Invalid reset link";
          document.querySelector("p").textContent = "This link appears to be expired or malformed. Please request a new one.";
          document.getElementById("openBtn").style.display = "none";
          return;
        }

        var deepLink = "passinglane://auth/reset-password?" + outputParams.toString();

        document.getElementById("openBtn").href = deepLink;
        window.location.href = deepLink;

        setTimeout(function () {
          document.querySelector("p").textContent =
            "Tap the button below if the app did not open automatically.";
        }, 2000);
      })();
    </script>
  </body>
</html>
